{% extends "base.html" %}

{% block title %}User Login - SecurePay{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-tabs">
        <button class="tab-btn active" onclick="switchTab('user')">User Login</button>
        <button class="tab-btn" onclick="switchTab('admin')">Admin Login</button>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="user-avatar">
                <svg width="80" height="80" viewBox="0 0 80 80">
                    <circle cx="40" cy="40" r="40" fill="#5B4DFF"/>
                    <circle cx="40" cy="30" r="12" fill="#fff"/>
                    <path d="M 20 55 Q 40 45, 60 55" stroke="#fff" stroke-width="4" fill="none"/>
                </svg>
            </div>
            
            <h2>User Verification</h2>
            
            <form method="POST" action="{{ url_for('user_login') }}">
                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number" 
                           pattern="[0-9]{10}" maxlength="10" required>
                </div>
                
                <button type="submit" class="btn-primary">Send OTP</button>
            </form>
            
            <div class="back-link">
                <a href="{{ url_for('index') }}">← Back to Homepage</a>
            </div>
        </div>
    </div>
</div>

<script>
function switchTab(tab) {
    if (tab === 'admin') {
        window.location.href = "{{ url_for('admin_login') }}";
    }
}
</script>
{% endblock %}
