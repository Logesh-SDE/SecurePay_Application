{% extends "base.html" %}

{% block title %}Create Account - SecurePay Admin{% endblock %}

{% block content %}
<div class="admin-dashboard">
    <nav class="admin-navbar">
        <div class="nav-brand">SecurePay Admin</div>
        <div class="nav-actions">
            <a href="{{ url_for('admin_dashboard') }}" class="btn-back">← Dashboard</a>
            <a href="{{ url_for('logout') }}" class="btn-logout">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <h1 class="page-title">Create New Account</h1>
        
        <div class="account-type-selector">
            <button class="type-btn active" onclick="showForm('user')">Create User</button>
            <button class="type-btn" onclick="showForm('merchant')">Create Merchant</button>
        </div>

        <div class="form-container">
            <!-- User Form -->
            <form method="POST" id="user-form" class="account-form active">
                <input type="hidden" name="account_type" value="user">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="user-name">Full Name *</label>
                        <input type="text" id="user-name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="user-mobile">Mobile Number *</label>
                        <input type="tel" id="user-mobile" name="mobile" pattern="[0-9]{10}" maxlength="10" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="user-email">Email Address</label>
                        <input type="email" id="user-email" name="email">
                    </div>
                    
                    <div class="form-group">
                        <label for="user-upi">UPI ID</label>
                        <input type="text" id="user-upi" name="upi_id" placeholder="Auto-generated if empty">
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">Create User Account</button>
            </form>

            <!-- Merchant Form -->
            <form method="POST" id="merchant-form" class="account-form">
                <input type="hidden" name="account_type" value="merchant">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="merchant-name">Business Name *</label>
                        <input type="text" id="merchant-name" name="merchant_name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="merchant-category">Business Category *</label>
                        <select id="merchant-category" name="category" required>
                            <option value="">Select Category</option>
                            <option value="retail">Retail</option>
                            <option value="food">Food & Beverage</option>
                            <option value="services">Services</option>
                            <option value="ecommerce">E-commerce</option>
                            <option value="healthcare">Healthcare</option>
                            <option value="education">Education</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="merchant-mobile">Contact Mobile *</label>
                        <input type="tel" id="merchant-mobile" name="mobile" pattern="[0-9]{10}" maxlength="10" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="merchant-email">Email Address</label>
                        <input type="email" id="merchant-email" name="email">
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">Create Merchant Account</button>
            </form>
        </div>
    </div>
</div>

<script>
function showForm(type) {
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.account-form').forEach(form => form.classList.remove('active'));
    
    if (type === 'user') {
        document.querySelector('.type-btn:first-child').classList.add('active');
        document.getElementById('user-form').classList.add('active');
    } else {
        document.querySelector('.type-btn:last-child').classList.add('active');
        document.getElementById('merchant-form').classList.add('active');
    }
}
</script>
{% endblock %}
